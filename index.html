<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="color-scheme" content="light">
    <title>Bizlin AI Labs — Research & Deployment</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Averia+Serif+Libre:ital,wght@0,300;0,400;0,700;1,300;1,400;1,700&family=Nunito+Sans:ital,wght@0,300;0,400;0,500;0,600;0,700;0,800;1,300;1,400;1,500;1,600;1,700;1,800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css" referrerpolicy="no-referrer" crossorigin="anonymous" integrity="sha384-PPIZEGYM1v8zp5Py7UjFb79S58UeqCL9pYVnVPURKEqvioPROaVAJKKLzvH2rDnI">
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.tailwindcss.com?plugins=container-queries"></script>
    <script>
      tailwind.config = {
        theme: {
          extend: {
            fontFamily: {
              sans: ['"Nunito Sans"', 'sans-serif'],
            },
            maxWidth: {
              container: '1440px',
            },
            borderRadius: {
              card: '6px',
              pill: '2.5rem',
            },
            colors: {
              primary: {
                60: 'var(--c-primary-60)',
                100: 'var(--c-primary)',
              },
            },
            transitionTimingFunction: {
              'curve-a': 'cubic-bezier(0.4, 0, 0.2, 1)',
              'curve-c': 'cubic-bezier(0.16, 1, 0.3, 1)',
            },
            transitionDuration: {
              short: '150ms',
              medium: '300ms',
              '250': '250ms',
            },
          },
        },
      };
    </script>
    <style>
      /* Theme variables — light only */
      :root {
        --c-primary: #000000;
        --c-primary-60: rgba(0,0,0,0.6);
        --c-bg: #ffffff;
        --c-surface: #ffffff;
        --c-border: rgba(0,0,0,0.1);
        --c-selection-bg: #000;
        --c-selection-fg: #fff;
        --c-hover-bg: #000;
        --c-hover-fg: #fff;
        --c-art-filter: none;
      }

      .sr-only { position: absolute; width: 1px; height: 1px; padding: 0; margin: -1px; overflow: hidden; clip: rect(0,0,0,0); white-space: nowrap; border: 0; }
      .font-banner { font-family: 'Averia Serif Libre', serif !important; font-weight: 400; letter-spacing: -0.01em; }
      html { -webkit-font-smoothing: antialiased; -moz-osx-font-smoothing: grayscale; text-rendering: optimizeLegibility; }
      body { font-size: 17px; line-height: 1.65; font-family: 'Nunito Sans', sans-serif !important; background: var(--c-bg); color: var(--c-primary); }
      *:not(.fa-solid):not(.fa-brands):not(.fa-regular):not(.fa-light):not(.fa-thin):not(.font-banner) { font-family: 'Nunito Sans', sans-serif !important; }
      .fa-solid, .fa-brands, .fa-regular, .fa-light, .fa-thin { font-family: "Font Awesome 6 Free", "Font Awesome 6 Brands", sans-serif !important; }
      h1, h2, h3, h4 { font-weight: 500; letter-spacing: -0.01em; }
      ::selection { background: var(--c-selection-bg); color: var(--c-selection-fg); }

      /* Custom utility classes — theme-aware via CSS variables */
      .primary-100 { color: var(--c-primary); }
      .primary-60 { color: var(--c-primary-60); }
      .hover\:primary-100:hover { color: var(--c-primary); }

      .art-card img { transition: transform 300ms cubic-bezier(0.16,1,0.3,1); filter: var(--c-art-filter); }
      .art-card:hover img { transform: scale(1.03); }

      .row-link { transition: color 250ms cubic-bezier(0.4,0,0.2,1); }
      .row-link:hover { color: var(--c-primary-60); }

      .pill { transition: background 250ms cubic-bezier(0.4,0,0.2,1), color 250ms cubic-bezier(0.4,0,0.2,1); }
      .pill:hover { background: var(--c-hover-bg); color: var(--c-hover-fg); }

      .cta-fill { transition: opacity 250ms cubic-bezier(0.4,0,0.2,1); }
      .cta-fill:hover { opacity: 0.7; }

      /* Native dialog — cross-browser backdrop + dark mode */
      dialog { color: var(--c-primary); background: var(--c-surface); border: 1px solid var(--c-border); }
      dialog::backdrop {
        background: rgba(0,0,0,0.6);
        -webkit-backdrop-filter: blur(4px);
        backdrop-filter: blur(4px);
      }
    </style>
</head>
<body class="font-sans">

    <!-- Header: 64px, transparent, mask-gradient right edge -->
    <header class="sticky top-0 z-50 bg-black text-white backdrop-blur-md border-b border-white/10">
        <div class="max-w-container mx-auto px-6 h-16 flex items-center justify-between">
            <a href="#" class="flex items-center gap-2 text-white" aria-label="BizlinAI home">
                <img src="bizlinai-logo.svg" alt="" class="h-8 w-8 [filter:brightness(0)_invert(1)]" aria-hidden="true">
                <span class="text-lg font-medium tracking-tight">BizlinAI</span>
            </a>
            <button onclick="document.getElementById('app-modal').showModal()" class="cta-fill inline-block bg-white text-black px-4 py-2 rounded-pill text-[15px] font-medium">Download</button>
        </div>
    </header>

    <main>
        <article class="flex flex-col gap-20 md:gap-30">

            <!-- 1. HERO — tagline + CTAs -->
            <section class="max-w-container mx-auto w-full px-6 pt-20 pb-24 md:pt-32 md:pb-28 flex flex-col items-center justify-center text-center">
                <h1 class="font-banner text-4xl md:text-6xl lg:text-7xl mb-12 primary-100" style="line-height:1.1;letter-spacing:-0.02em">Frontier intelligence,<br>deployed for everyone.</h1>
                <div class="flex flex-col sm:flex-row gap-4">
                    <button onclick="document.getElementById('app-modal').showModal()" class="cta-fill inline-flex items-center justify-center gap-2.5 bg-black text-white px-7 py-3.5 rounded-pill text-base font-medium leading-none">
                        <i class="fa-solid fa-download text-[16px] leading-none"></i>
                        Get The App
                    </button>
                </div>
            </section>

        </article>
    </main>

    <!-- Footer -->
    <footer class="border-t border-black/10">
        <div class="max-w-container mx-auto px-6 py-8 flex flex-col md:flex-row justify-between items-center gap-4">
            <p class="text-sm primary-60">Bizlin AI Labs © 2026</p>
            <div class="flex gap-6 text-sm primary-60">
                <a href="#" class="hover:primary-100 transition-colors duration-short ease-curve-a">Terms</a>
                <a href="#" class="hover:primary-100 transition-colors duration-short ease-curve-a">Privacy</a>
                <a href="#" class="hover:primary-100 transition-colors duration-short ease-curve-a">Policies</a>
            </div>
        </div>
    </footer>

    <!-- App download modal (native <dialog> for accessibility) -->
    <dialog id="app-modal" class="rounded-2xl shadow-2xl max-w-md w-full p-8 backdrop:bg-black/60 backdrop:backdrop-blur-sm">
        <button onclick="document.getElementById('app-modal').close()" class="absolute top-4 right-4 w-9 h-9 flex items-center justify-center rounded-full hover:bg-black/5 transition-colors duration-short ease-curve-a" aria-label="Close">
            <i class="fa-solid fa-xmark text-[18px] text-black"></i>
        </button>
        <h2 id="app-modal-title" class="font-banner text-2xl mb-2 primary-100">Get Bizlin AI</h2>
        <p class="text-sm primary-60 mb-6">Download on any platform. Free forever.</p>
        <div class="flex flex-col gap-3">
            <!-- App Store -->
            <a href="#" class="flex items-center gap-4 border border-black/10 rounded-xl p-4 hover:border-black/30 transition-colors duration-short ease-curve-a">
                <i class="fa-brands fa-apple text-[28px] text-black shrink-0"></i>
                <div class="flex-1 text-left">
                    <p class="text-xs primary-60">Download on the</p>
                    <p class="text-base font-medium primary-100">App Store</p>
                </div>
            </a>
            <!-- Play Store -->
            <a href="#" class="flex items-center gap-4 border border-black/10 rounded-xl p-4 hover:border-black/30 transition-colors duration-short ease-curve-a">
                <i class="fa-brands fa-google-play text-[26px] shrink-0"></i>
                <div class="flex-1 text-left">
                    <p class="text-xs primary-60">GET IT ON</p>
                    <p class="text-base font-medium primary-100">Google Play</p>
                </div>
            </a>
            <!-- Direct APK -->
            <a href="#" class="flex items-center gap-4 border border-black/10 rounded-xl p-4 hover:border-black/30 transition-colors duration-short ease-curve-a">
                <i class="fa-solid fa-file-arrow-down text-[26px] text-black shrink-0"></i>
                <div class="flex-1 text-left">
                    <p class="text-xs primary-60">Direct download</p>
                    <p class="text-base font-medium primary-100">APK file</p>
                </div>
            </a>
        </div>
    </dialog>

</body>
</html>
